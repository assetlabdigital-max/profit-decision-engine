name: Supabase keep-alive

on:
  schedule:
    # Daily ping — keeps Supabase free-tier DB activity above the 7-day pause threshold.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production health (DB SELECT 1)
        run: |
          set -euo pipefail
          body="$(curl -fsS "https://www.profit-decision-engine.com/api/health")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'
