name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:match-quality

      - run: npm run test:edge-cases

      - run: npm run build
        env:
          AUTH_SECRET: ci-build-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
